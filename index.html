<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Tournament Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0B1215; color: #fff; text-align: center; padding-bottom: 50px; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .card { background: #020D19; padding: 20px; border-radius: 12px; margin: 15px 0; border: 1px solid #444; }
        input { padding: 10px; margin: 5px; background: #011222; border: 1px solid #555; color: #fff; border-radius: 4px; }
        button { padding: 10px 20px; border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; margin: 5px; }
        .btn-primary { background: #2980b9; }
        .btn-success { background: #27ae60; }
        .btn-danger { background: #c0392b; }
        .btn-special { background: #8e44ad; }
        .roleta { font-size: 48px; font-weight: bold; color: #f1c40f; margin: 15px 0; height: 60px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #444; }
        th { background: #3d3d3d; }
        .bye-alert { color: #f1c40f; padding: 10px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Magic The Gathering Manager</h1>
        <button class="btn-danger" onclick="resetarCampeonato()" style="font-size: 0.8em; padding: 5px 10px;">Resetar Tudo</button>

        <!-- ETAPA 1: CADASTRO -->
        <div id="etapa1" class="card">
            <h3>Jogadores (Limite 8)</h3>
            <div id="inputs">
                <input type="text" class="nome-jogador" placeholder="Jogador 1">
                <input type="text" class="nome-jogador" placeholder="Jogador 2">
            </div>
            <button class="btn-primary" onclick="addInput()">+ Jogador</button>
            <button class="btn-success" onclick="iniciarCampeonato()">Começar Torneio</button>
        </div>

        <!-- ETAPA 2: TORNEIO -->
        <div id="etapa2" class="hidden">
            <div class="card">
                <h3>Sorteio de Deck</h3>
                <label>Quantidade de Decks: </label>
                <input type="number" id="qtdDecks" value="30" min="1" style="width: 60px; text-align: center;">
                <div class="roleta" id="displayRoleta">?</div>
                <button class="btn-special" onclick="girarRoleta()">Girar Roleta</button>
            </div>

            <div class="card">
                <h3>Confrontos da Rodada</h3>
                <div id="statusFim"></div>
                <button class="btn-primary" id="btnSortear" onclick="sortearConfrontos()">Gerar Partidas Inéditas</button>
                <div id="listaConfrontos"></div>
                <div id="byeArea" class="bye-alert"></div>
            </div>

            <div class="card">
                <h3>Tabela de Classificação</h3>
                <table>
                    <thead>
                        <tr><th>#</th><th>Jogador</th><th>V</th><th>D</th></tr>
                    </thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let jogadores = [];
        let historico = [];
        let confrontosAtuais = [];
        let byeAtual = null;

        function addInput() {
            const inputs = document.querySelectorAll('.nome-jogador');
            if (inputs.length < 8) {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'nome-jogador';
                input.placeholder = 'Jogador ' + (inputs.length + 1);
                document.getElementById('inputs').appendChild(input);
            }
        }

        function iniciarCampeonato() {
            const inputs = document.querySelectorAll('.nome-jogador');
            jogadores = Array.from(inputs)
                .map(i => i.value.trim())
                .filter(v => v !== "")
                .map(nome => ({ nome, v: 0, d: 0 }));

            if (jogadores.length < 2) return alert("Mínimo de 2 jogadores!");
            
            document.getElementById('etapa1').classList.add('hidden');
            document.getElementById('etapa2').classList.remove('hidden');
            atualizarTabela();
        }

        function sortearConfrontos() {
            let novosConfrontos = [];
            let jaPareados = [];
            let pool = [...jogadores];
            
            for (let t = 0; t < 100; t++) {
                pool.sort(() => Math.random() - 0.5);
                let tempConfrontos = [];
                let tempPareados = [];

                for (let i = 0; i < pool.length; i++) {
                    let j1 = pool[i];
                    if (tempPareados.includes(j1.nome)) continue;

                    for (let j = 0; j < pool.length; j++) {
                        let j2 = pool[j];
                        if (j1.nome === j2.nome || tempPareados.includes(j2.nome)) continue;

                        let par = [j1.nome, j2.nome].sort().join('|');
                        if (!historico.includes(par)) {
                            tempConfrontos.push([j1.nome, j2.nome]);
                            tempPareados.push(j1.nome, j2.nome);
                            break;
                        }
                    }
                }

                if (tempPareados.length >= jogadores.length - 1) {
                    novosConfrontos = tempConfrontos;
                    jaPareados = tempPareados;
                    break;
                }
            }

            if (novosConfrontos.length === 0) {
                exibirFimDeJogo();
                return;
            }

            confrontosAtuais = novosConfrontos;
            byeAtual = jogadores.find(j => !jaPareados.includes(j.nome))?.nome || null;
            renderizarConfrontos();
        }

        function renderizarConfrontos() {
            const container = document.getElementById('listaConfrontos');
            container.innerHTML = '';
            
            confrontosAtuais.forEach((c, index) => {
                const div = document.createElement('div');
                div.style = "margin: 10px; padding: 15px; background: #333; border-radius: 8px; border-left: 5px solid #8e44ad;";
                div.innerHTML = `
                    <strong>${c[0]}</strong> vs <strong>${c[1]}</strong><br><br>
                    <button class="btn-success" onclick="registrarVitoria(${index}, '${c[0]}', '${c[1]}')">Venceu: ${c[0]}</button>
                    <button class="btn-success" onclick="registrarVitoria(${index}, '${c[1]}', '${c[0]}')">Venceu: ${c[1]}</button>
                `;
                container.appendChild(div);
            });

            document.getElementById('byeArea').innerText = byeAtual ? `🌟 De fora nesta rodada: ${byeAtual}` : '';
        }

        function registrarVitoria(index, vencedor, perdedor) {
            historico.push([vencedor, perdedor].sort().join('|'));

            jogadores.find(j => j.nome === vencedor).v++;
            jogadores.find(j => j.nome === perdedor).d++;

            confrontosAtuais.splice(index, 1);
            
            renderizarConfrontos();
            atualizarTabela();
        }

        function atualizarTabela() {
            const corpo = document.getElementById('tabelaCorpo');
            const rank = [...jogadores].sort((a, b) => b.v - a.v || a.d - b.d);
            
            corpo.innerHTML = rank.map((j, i) => `
                <tr>
                    <td>${i + 1}º</td>
                    <td>${j.nome}</td>
                    <td>${j.v}</td>
                    <td>${j.d}</td>
                </tr>
            `).join('');
        }

        function exibirFimDeJogo() {
            const status = document.getElementById('statusFim');
            const rank = [...jogadores].sort((a, b) => b.v - a.v || a.d - b.d);
            const p1 = rank[0];
            const p2 = rank[1];

            document.getElementById('btnSortear').classList.add('hidden');
            
            let html = "<div style='padding: 20px; border: 2px solid #2ecc71; border-radius: 10px;'>";
            if (p1.v > p2.v) {
                html += `<h2 style="color: #2ecc71;">🏆 Campeão: ${p1.nome}</h2>`;
            } else {
                html += `<h2 style="color: #f1c40f;"> EMPATE TÉCNICO</h2>`;
                html += `<p style="font-size: 1.2em;">Confronto final entre <strong>${p1.nome}</strong> e <strong>${p2.nome}</strong></p>`;
            }
            html += "</div>";
            status.innerHTML = html;
        }

        function girarRoleta() {
            const max = parseInt(document.getElementById('qtdDecks').value);
            const display = document.getElementById('displayRoleta');
            if (isNaN(max) || max < 1) return alert("Insira um número válido!");

            let giros = 0;
            display.style.color = "#f1c40f";
            const intervalo = setInterval(() => {
                display.innerText = Math.floor(Math.random() * max) + 1;
                if (++giros > 20) {
                    clearInterval(intervalo);
                    display.style.color = "#2ecc71";
                }
            }, 80);
        }

        function resetarCampeonato() {
            if (confirm("Deseja resetar tudo?")) location.reload();
        }
    </script>
</body>
</html>
